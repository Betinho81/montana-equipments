<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana Equipments — Sistema de Gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --v:#1a3a2e;--vm:#2d5c47;--vl:#3d7a60;
  --d:#c9a227;--dl:#e8c84a;--dp:#f5e9c0;--dpp:#fdf6e3;
  --be:#e8dcc8;--bd:#d4c5a9;--cr:#faf7f0;
  --bo:rgba(26,58,46,0.12);--boh:rgba(26,58,46,0.22);
  --td:#1a1a1a;--tm:#4a4a4a;--tl:#8a8a8a;
  --white:#ffffff;
  --sh:0 1px 3px rgba(26,58,46,0.08),0 4px 12px rgba(26,58,46,0.06);
  --sh2:0 2px 8px rgba(26,58,46,0.12),0 8px 24px rgba(26,58,46,0.08);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cr);color:var(--td);font-size:14px;line-height:1.5;}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;background:var(--v);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
}
#login-screen.hidden{display:none;}
.login-card{
  background:var(--white);border-radius:20px;
  padding:40px;width:380px;
  border-top:5px solid var(--d);
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.login-circ{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--d);background:var(--v);
  display:flex;align-items:center;justify-content:center;
  color:var(--d);font-size:22px;flex-shrink:0;
}
.login-brand{font-size:19px;font-weight:600;color:var(--v);}
.login-sub{font-size:10px;color:#aaa;letter-spacing:2.5px;text-transform:uppercase;margin-top:1px;}
.login-label{font-size:11px;font-weight:600;color:var(--v);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:5px;margin-top:14px;}
.login-input{
  width:100%;padding:10px 14px;
  border:1px solid var(--bd);border-radius:9px;
  font-size:13.5px;background:var(--cr);
  font-family:'DM Sans',sans-serif;outline:none;color:var(--td);
  transition:border-color .15s,background .15s;
}
.login-input:focus{border-color:var(--d);background:var(--white);}
.login-btn{
  width:100%;padding:12px;margin-top:20px;
  background:var(--v);color:var(--d);
  border:none;border-radius:9px;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s;
}
.login-btn:hover{background:var(--vm);}
.login-div{border:none;border-top:1px solid #eee;margin:20px 0 14px;}
.login-qtit{font-size:10px;color:#bbb;text-align:center;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
.login-qbtn{
  width:100%;padding:10px 14px;margin-bottom:7px;
  border:1px solid var(--bd);border-radius:9px;
  background:var(--cr);cursor:pointer;
  font-size:12.5px;color:var(--v);
  display:flex;align-items:center;gap:10px;
  font-family:'DM Sans',sans-serif;
  transition:background .15s,border-color .15s;
}
.login-qbtn:hover{background:var(--dp);border-color:var(--d);}
.login-qbtn b{display:block;font-weight:600;font-size:13px;}
.login-qbtn span{font-size:11px;color:#999;}
.login-err{color:#c0392b;font-size:12px;text-align:center;margin-top:8px;display:none;}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;}
.topbar{
  background:var(--v);height:54px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:3px solid var(--d);
  flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--d);background:var(--vm);
  display:flex;align-items:center;justify-content:center;
  color:var(--d);font-size:15px;
}
.tb-name{font-size:15px;font-weight:600;color:var(--be);}
.tb-ver{font-size:9px;color:var(--d);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-user{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(201,162,39,.25);
  border-radius:20px;padding:5px 12px;
}
.tb-uname{font-size:12px;color:var(--be);}
.tb-role{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--d);color:var(--v);}
.tb-logout{
  font-size:12px;color:rgba(232,220,200,.5);cursor:pointer;
  padding:5px 10px;border:1px solid rgba(232,220,200,.18);
  border-radius:7px;background:transparent;
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;gap:5px;
  transition:color .15s;
}
.tb-logout:hover{color:var(--d);}

.body-wrap{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:190px;background:var(--v);padding:12px 0;overflow-y:auto;flex-shrink:0;}
.sb-section{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(201,162,39,.5);font-weight:600;padding:0 14px;margin:10px 0 4px;display:block;}
.sb-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 14px;cursor:pointer;
  color:rgba(232,220,200,.6);font-size:12.5px;
  border-left:3px solid transparent;
  transition:all .15s;
}
.sb-item:hover{background:rgba(201,162,39,.07);color:var(--be);}
.sb-item.active{background:rgba(201,162,39,.12);color:var(--d);border-left-color:var(--d);font-weight:500;}
.sb-item i{font-size:16px;}
.sb-div{height:1px;background:rgba(201,162,39,.1);margin:6px 12px;}
.sb-badge{margin-left:auto;background:rgba(201,162,39,.2);color:var(--d);font-size:10px;padding:1px 6px;border-radius:8px;}

/* ── MAIN ── */
.main-area{flex:1;overflow-y:auto;padding:20px 22px;background:var(--cr);}

/* ── KPI CARDS ── */
.kpi-row{display:grid;gap:12px;margin-bottom:16px;}
.kpi-4{grid-template-columns:repeat(4,1fr);}
.kpi-3{grid-template-columns:repeat(3,1fr);}
.kpi-card{
  background:var(--white);border:0.5px solid var(--bo);
  border-radius:12px;padding:14px 16px;
  position:relative;overflow:hidden;
  cursor:pointer;
  box-shadow:var(--sh);
  transition:transform .15s,box-shadow .15s;
}
.kpi-card:hover{transform:translateY(-1px);box-shadow:var(--sh2);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--d);}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tl);font-weight:600;margin-bottom:4px;}
.kpi-val{font-size:22px;font-weight:600;color:var(--v);line-height:1.1;}
.kpi-sub{font-size:10px;color:var(--tl);margin-top:3px;}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;}
.page-title{font-size:22px;font-weight:600;color:var(--v);}
.page-sub{font-size:12px;color:var(--tl);margin-top:2px;}
.page-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-gold{background:var(--d);color:var(--v);}.btn-gold:hover{background:var(--dl);}
.btn-dark{background:var(--v);color:var(--d);border:1px solid var(--v);}.btn-dark:hover{background:var(--vm);}
.btn-out{background:transparent;color:var(--v);border:1px solid var(--bo);}.btn-out:hover{background:var(--v);color:var(--d);}
.btn-danger{background:transparent;color:#c0392b;border:1px solid #c0392b;}.btn-danger:hover{background:#c0392b;color:#fff;}
.btn-sm{padding:5px 10px;font-size:11.5px;}
.btn-pdf{background:#e3f2fd;color:#1565c0;border:1px solid #1565c0;}
.btn-pdf:hover{background:#1565c0;color:#fff;}
.btn-ok{background:#e8f5e9;color:#2e7d32;border:1px solid #2e7d32;}
.btn-ok:hover{background:#2e7d32;color:#fff;}
.btn-reject{background:#fce4ec;color:#c0392b;border:1px solid #c0392b;}
.btn-reject:hover{background:#c0392b;color:#fff;}

/* ── CARD ── */
.card{background:var(--white);border:0.5px solid var(--bo);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:var(--sh);}
.card-head{padding:11px 16px;border-bottom:0.5px solid var(--bo);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:13px;font-weight:500;color:var(--v);display:flex;align-items:center;gap:7px;}
.card-title i{color:var(--d);}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;max-height:400px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{background:var(--v);color:var(--d);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:9px 11px;text-align:left;position:sticky;top:0;white-space:nowrap;z-index:1;}
td{padding:8px 11px;color:var(--td);border-bottom:0.5px solid rgba(26,58,46,.05);white-space:nowrap;}
tr:hover td{background:rgba(201,162,39,.03);}
tr:last-child td{border-bottom:none;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-green{background:#e8f5e9;color:#2e7d32;}
.badge-yellow{background:#fff8e1;color:#c77700;}
.badge-blue{background:#e3f2fd;color:#1565c0;}
.badge-red{background:#fce4ec;color:#c62828;}
.badge-gray{background:#f0ede6;color:#5a5a5a;}
.badge-gold{background:var(--dp);color:var(--v);}
.badge-orange{background:#fff3e0;color:#e65100;}

/* ── FILTER BAR ── */
.filter-bar{
  background:var(--white);border:0.5px solid var(--bo);
  border-radius:10px;padding:10px 14px;
  margin-bottom:12px;display:flex;align-items:center;
  gap:8px;flex-wrap:wrap;
  box-shadow:var(--sh);
}
.filter-input{
  padding:7px 11px;border:0.5px solid var(--bd);
  border-radius:7px;font-size:12.5px;background:var(--cr);
  font-family:'DM Sans',sans-serif;outline:none;color:var(--td);
}
.filter-input:focus{border-color:var(--d);background:var(--white);}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  display:flex;align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;z-index:500;
}
.modal-bg.hidden{display:none;}
.modal{
  background:var(--white);border-radius:16px;
  width:100%;max-width:680px;
  border-top:4px solid var(--d);
  margin:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-head{padding:14px 20px 12px;border-bottom:0.5px solid var(--bo);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:18px;font-weight:500;color:var(--v);}
.modal-sub{font-size:11px;color:var(--tl);margin-top:2px;}
.modal-body{padding:18px 20px;max-height:68vh;overflow-y:auto;}
.modal-foot{padding:12px 20px;border-top:0.5px solid var(--bo);display:flex;justify-content:flex-end;gap:8px;}
.modal-close{width:30px;height:30px;border-radius:8px;border:0.5px solid var(--bo);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tl);font-size:16px;flex-shrink:0;}
.modal-close:hover{background:var(--cr);color:var(--v);}

/* ── AUTO STRIP ── */
.auto-strip{display:flex;border:1px solid var(--vm);border-radius:10px;overflow:hidden;margin-bottom:16px;background:var(--dp);}
.auto-cell{flex:1;padding:10px 15px;border-right:1px solid rgba(45,92,71,.2);}
.auto-cell:last-child{border-right:none;}
.auto-label{font-size:9px;font-weight:600;color:var(--vm);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.auto-val{font-size:19px;font-weight:600;color:var(--v);}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:10px;font-weight:600;color:var(--v);text-transform:uppercase;letter-spacing:.5px;}
.form-input{
  padding:8px 12px;border:0.5px solid var(--bd);
  border-radius:8px;font-size:13px;background:var(--cr);
  font-family:'DM Sans',sans-serif;outline:none;color:var(--td);
  width:100%;
}
.form-input:focus{border-color:var(--d);background:var(--white);}
.form-textarea{min-height:60px;resize:vertical;}

/* ── COT LINE CARD ── */
.cot-line{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px;background:var(--white);
  border:0.5px solid var(--bo);border-radius:10px;
  margin-bottom:7px;
  box-shadow:var(--sh);
}
.cot-foto{
  width:48px;height:48px;border-radius:8px;
  background:var(--dp);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;overflow:hidden;
}
.cot-foto img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.cot-foto i{font-size:20px;color:var(--vm);}
.cot-body{flex:1;min-width:0;}
.cot-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;}
.cot-sku{font-size:10px;font-weight:600;color:var(--d);background:var(--v);padding:2px 7px;border-radius:8px;}
.cot-name{font-size:13px;font-weight:500;color:var(--v);}
.cot-desc{font-size:11px;color:var(--tl);margin-bottom:5px;line-height:1.4;}
.cot-nums{display:flex;gap:14px;flex-wrap:wrap;}
.cot-num-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--tl);font-weight:600;}
.cot-num-val{font-size:12.5px;font-weight:500;color:var(--v);}
.cot-num-val.gold{color:var(--d);font-size:13.5px;font-weight:600;}
.cot-del{width:26px;height:26px;border-radius:6px;border:none;background:#fce4ec;color:#c0392b;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:center;}

/* ── TOTAL BOX ── */
.total-box{
  background:var(--v);border-radius:11px;
  padding:14px 18px;display:flex;
  justify-content:space-between;align-items:center;
  margin-top:10px;
}

/* ── PRODUCT GRID ── */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.prod-card{background:var(--white);border:0.5px solid var(--bo);border-radius:10px;overflow:hidden;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;}
.prod-card:hover{transform:translateY(-1px);box-shadow:var(--sh2);border-color:var(--d);}
.prod-head{background:var(--v);padding:9px 12px;}
.prod-name{color:var(--be);font-weight:500;font-size:12.5px;line-height:1.3;}
.prod-sku{color:var(--d);font-size:10px;margin-top:2px;}
.prod-body{padding:10px 12px;}
.prod-row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--tm);padding:3px 0;border-bottom:0.5px solid rgba(26,58,46,.05);}
.prod-row:last-child{border-bottom:none;}
.prod-row span:last-child{font-weight:500;color:var(--v);}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;}
.toast{
  background:var(--v);color:var(--be);
  padding:10px 15px;border-radius:10px;
  font-size:12.5px;font-family:'DM Sans',sans-serif;
  border-left:4px solid var(--d);
  display:flex;align-items:center;gap:8px;
  min-width:240px;
  box-shadow:var(--sh2);
  animation:slideIn .2s ease;
}
.toast-success{border-left-color:#27ae60;}
.toast-error{border-left-color:#c0392b;}
.toast-warn{border-left-color:#f39c12;}
@keyframes slideIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ── NOTA BOX ── */
.nota-box{background:#fff8e1;border:0.5px solid #c77700;border-radius:9px;padding:10px 14px;font-size:12px;color:#6d4c00;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;}

/* ── PROD PREVIEW ── */
#prod-preview{display:none;background:var(--cr);border-radius:9px;padding:10px 13px;margin-bottom:12px;border:0.5px solid var(--bo);align-items:center;gap:10px;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}

// ─── STORAGE (localStorage para persistencia real) ───
function saveData(){
  try{
    localStorage.setItem('mt_cots', JSON.stringify(S.cots));
    localStorage.setItem('mt_prods', JSON.stringify(S.prods));
    localStorage.setItem('mt_bls', JSON.stringify(S.bls));
  }catch(e){}
}
function loadData(){
  try{
    const c=localStorage.getItem('mt_cots');
    const p=localStorage.getItem('mt_prods');
    const b=localStorage.getItem('mt_bls');
    S.cots = c?JSON.parse(c):[...OCS_INIT];
    S.prods = p?JSON.parse(p):[...PRODS_INIT];
    S.bls = b?JSON.parse(b):[];
  }catch(e){
    S.cots=[...OCS_INIT];
    S.prods=[...PRODS_INIT];
    S.bls=[];
  }
}

// ─── HELPERS ───
const fN=(n,d=0)=>Number(n||0).toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const isReadOnly=()=>S.user&&(S.user.r==='observador'||S.user.r==='proveedor'||S.user.r==='bodega');
const isAdmin=()=>S.user&&S.user.r==='admin';
const fR=n=>'¥'+fN(n,0);
const fU=n=>'$'+fN(n,2);
const todayDisp=()=>new Date().toLocaleDateString('es-CO',{year:'numeric',month:'2-digit',day:'2-digit'});
const todayISO=()=>new Date().toISOString().split('T')[0];
const curYear=()=>new Date().getFullYear();

function nextOC(){
  const nums=S.cots.map(c=>parseInt(c.oc)).filter(n=>!isNaN(n));
  return String(Math.max(...nums,31)+1).padStart(3,'0')+'/'+curYear();
}

let _tc=0;
function toast(msg,type='success'){
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.innerHTML=`<i class="ti ti-${type==='success'?'circle-check':type==='error'?'circle-x':'alert-triangle'}" style="font-size:15px;"></i>${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.style.opacity='0',2800);
  setTimeout(()=>el.remove(),3100);
}

var _modalRendering = false;
function openModal(html){
  if(_modalRendering) return;
  _modalRendering = true;
  try{
    document.getElementById('modal-box').innerHTML=html;
    document.getElementById('modal-bg').classList.remove('hidden');
    bindModal();
  } finally {
    _modalRendering = false;
  }
}
function closeModal(){
  document.getElementById('modal-bg').classList.add('hidden');
  document.getElementById('modal-box').innerHTML='';
  _modalRendering = false;
  window._r = false;
}

// ─── AUTH ───
function doLogin(){
  const e=document.getElementById('le').value.trim().toLowerCase();
  const p=document.getElementById('lp').value.trim();
  const u=USERS.find(x=>x.e.toLowerCase()===e&&x.p===p);
  if(!u){document.getElementById('login-err').style.display='block';return;}
  S.user=u;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-uname').textContent=u.n;
  document.getElementById('tb-role').textContent=u.r.toUpperCase();
  loadData();
  loadCIFFirmes();
  renderSidebar();
  renderPage();
}
function quickLogin(r){
  const u=USERS.find(x=>x.r===r);if(!u)return;
  document.getElementById('le').value=u.e;
  document.getElementById('lp').value=u.p;
  doLogin();
}
function doLogout(){
  S.user=null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').style.display='none';
}

// ─── SIDEBAR ───
function renderSidebar(){
  const r=S.user.r;
  let html='';
  html+=`<span class="sb-section">Importación</span>`;
  html+=`<div class="sb-item ${S.page==='cots'?'active':''}" data-p="cots"><i class="ti ti-calculator"></i>Cotizaciones<span class="sb-badge">${S.cots.length}</span></div>`;
  html+=`<div class="sb-item ${S.page==='cif'?'active':''}" data-p="cif"><i class="ti ti-coin"></i>Calculadora CIF${S.user&&S.user.r!=='admin'?'<i class="ti ti-eye" style="margin-left:auto;font-size:12px;opacity:.5;" title="Solo lectura"></i>':'<span class="sb-badge" style="background:rgba(201,162,39,.2);color:var(--d);">CIF</span>'}</div>`;
  html+=`<div class="sb-item ${S.page==='bl'?'active':''}" data-p="bl"><i class="ti ti-ship"></i>BL Management<span class="sb-badge">${S.bls.length}</span></div>`;
  html+=`<div class="sb-div"></div><span class="sb-section">Catálogo</span>`;
  html+=`<div class="sb-item ${S.page==='prods'?'active':''}" data-p="prods"><i class="ti ti-package"></i>Productos<span class="sb-badge">${S.prods.length}</span></div>`;
  document.getElementById('sidebar').innerHTML=html;
  document.querySelectorAll('.sb-item[data-p]').forEach(el=>{
    el.onclick=()=>{S.page=el.dataset.p;renderSidebar();renderPage();};
  });
}

// ─── PAGES ───
window._r = false;
function renderPage(){
  if(window._r) return;
  window._r = true;
  try{
    const ma=document.getElementById('main-area');
    if(S.page==='cots') ma.innerHTML=pageCots();
    else if(S.page==='prods') ma.innerHTML=pageProds();
    else if(S.page==='cif') ma.innerHTML=pageCIF();
    else if(S.page==='bl'){ma.innerHTML=pageBL();bindBL();}
    bindPage();
  } finally {
    window._r = false;
  }
}

function pageProds(){
  const grupos=[...new Set(S.prods.map(p=>p.g))].sort();
  const fil=S.prods.filter(p=>{
    if(S.pS&&!`${p.sku} ${p.n} ${p.ne||''}`.toLowerCase().includes(S.pS.toLowerCase()))return false;
    if(S.pG&&p.g!==S.pG)return false;
    return true;
  });
  const adminUser = isAdmin();
  const newProdBtn = adminUser
    ? '<button class="btn btn-gold btn-sm" id="btn-new-prod"><i class="ti ti-plus"></i>Nuevo Producto</button>'
    : '<span style="font-size:11px;background:#f0ede6;color:#5a5a5a;padding:4px 10px;border-radius:20px;"><i class="ti ti-eye" style="margin-right:4px;"></i>Solo lectura</span>';
  const prodActionBtns = adminUser
    ? function(id){return '<button class="btn btn-out btn-sm btn-edit-prod" data-id="'+id+'" style="flex:1;"><i class="ti ti-edit"></i>Edit</button><button class="btn btn-danger btn-sm btn-del-prod" data-id="'+id+'"><i class="ti ti-trash"></i></button>';}
    : function(id){return '<span style="font-size:11px;color:var(--tl);padding:4px 0;"><i class="ti ti-eye" style="margin-right:4px;"></i>Solo lectura</span>';};
  const icons={Equipos:'ti-engine',Accesorios:'ti-plug',Almacenamiento:'ti-box','Construcción':'ti-building',Agricultura:'ti-plant',Herramientas:'ti-tools',Seguridad:'ti-shield',default:'ti-package'};

  var h = '';
  h += '<div class="ph"><div><div class="ptit">Catálogo de Productos</div>';
  h += '<div class="psub">'+fil.length+' de '+S.prods.length+' productos</div></div>';
  h += newProdBtn+'</div>';

  h += '<div class="filter-bar">';
  h += '<input class="filter-input" id="p-search" placeholder="SKU, nombre ES/EN..." value="'+S.pS+'" style="width:200px;">';
  h += '<select class="filter-input" id="p-grupo" style="width:150px;">';
  h += '<option value="">Todos los grupos</option>';
  grupos.forEach(function(g){
    h += '<option value="'+g+'"'+(S.pG===g?' selected':'')+'>'+g+'</option>';
  });
  h += '</select>';
  if(S.pS||S.pG){
    h += '<button class="btn btn-out btn-sm" data-action="clear-prod-filter"><i class="ti ti-x"></i></button>';
  }
  h += '</div>';

  h += '<div class="prod-grid">';
  fil.forEach(function(p){
    const cbmU = p.ancho&&p.alto&&p.fondo ? (p.ancho*p.alto*p.fondo/1000000) : 0;
    const icon = icons[p.g]||icons.default;
    const fotoHtml = (p.fotos&&p.fotos.length)
      ? '<img src="'+p.fotos[0]+'" style="width:34px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0;" alt="">'
      : '<div style="width:34px;height:34px;border-radius:6px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti '+icon+'" style="color:var(--d);font-size:16px;"></i></div>';

    h += '<div class="prod-card">';
    h += '<div class="prod-head">';
    h += '<div style="display:flex;align-items:center;gap:8px;">'+fotoHtml;
    h += '<div><div class="prod-name">'+p.n+'</div>';
    if(p.ne) h += '<div style="font-size:10px;color:rgba(232,220,200,.6);margin-top:1px;font-style:italic;">'+p.ne+'</div>';
    h += '<div class="prod-sku">SKU '+p.sku+'</div></div></div></div>';

    h += '<div class="prod-body">';
    h += '<div class="prod-row"><span>'+p.g+'</span><span>'+B(p.apro)+'</span></div>';
    h += '<div class="prod-row"><span>Precio RMB</span><span>'+(p.rmb?'¥'+p.rmb:'—')+'</span></div>';
    h += '<div class="prod-row"><span>Subpartida</span><span style="font-size:10.5px;">'+(p.sub||'—')+'</span></div>';

    if(cbmU||p.peso){
      h += '<div style="border-top:0.5px solid rgba(26,58,46,.08);margin-top:3px;padding-top:4px;display:flex;gap:6px;flex-wrap:wrap;">';
      if(cbmU) h += '<span style="font-size:10px;background:#e3f2fd;color:#1565c0;padding:2px 7px;border-radius:10px;">CBM '+cbmU.toFixed(4)+'</span>';
      if(p.peso) h += '<span style="font-size:10px;background:#f3e5f5;color:#6a1b9a;padding:2px 7px;border-radius:10px;">'+p.peso+' kg</span>';
      h += '</div>';
    }
    if(p.d) h += '<div class="prod-row" style="font-size:10.5px;color:var(--tl);border-bottom:none;padding-top:4px;">'+p.d+'</div>';
    h += '</div>';

    h += '<div style="padding:7px 12px;border-top:0.5px solid var(--bo);display:flex;gap:5px;">';
    h += prodActionBtns(p.id);
    h += '</div></div>';
  });
  h += '</div>';
  return h;
}

function bindPage(){
  // Filters
  const fs=document.getElementById('f-search');if(fs)fs.oninput=e=>{S.fS=e.target.value;renderPage();};
  const fe=document.getElementById('f-estado');if(fe)fe.onchange=e=>{S.fE=e.target.value;renderPage();};
  const fa=document.getElementById('f-ano');if(fa)fa.onchange=e=>{S.fA=e.target.value;renderPage();};
  const ps=document.getElementById('p-search');if(ps)ps.oninput=e=>{S.pS=e.target.value;renderPage();};
  const pg=document.getElementById('p-grupo');if(pg)pg.onchange=e=>{S.pG=e.target.value;renderPage();};
  // Cotizaciones
  if(document.getElementById('btn-new-cot'))document.getElementById('btn-new-cot').onclick=function(){if(isReadOnly()){toast('Solo el administrador puede crear cotizaciones','warn');return;}S.ncL=[];S.ncC='';S.ncN='';openModal(modalNewCot());};
  document.querySelectorAll('.btn-ver-cot').forEach(b=>b.onclick=()=>openModal(modalVerCot(+b.dataset.id)));
  document.querySelectorAll('.btn-apro').forEach(b=>b.onclick=()=>{
    if(isReadOnly()){toast('Solo el administrador puede aprobar cotizaciones','warn');return;}
    const c=S.cots.find(x=>x.id===+b.dataset.id);
    if(c){c.estado='En proceso';saveData();renderSidebar();renderPage();toast('Cotización aprobada → importación activa ✓');}
  });
  document.querySelectorAll('.btn-recha').forEach(b=>b.onclick=()=>{
    if(isReadOnly()){toast('Solo el administrador puede rechazar cotizaciones','warn');return;}
    const c=S.cots.find(x=>x.id===+b.dataset.id);
    if(c){c.estado='Rechazada';saveData();renderSidebar();renderPage();toast('Cotización rechazada','warn');}
  });
  // Productos
  if(document.getElementById('btn-new-prod')) document.getElementById('btn-new-prod').onclick=()=>openModal(modalProd(null));
  document.querySelectorAll('.btn-edit-prod').forEach(b=>b.onclick=()=>{
    const p=S.prods.find(x=>x.id===+b.dataset.id);openModal(modalProd(p));
  });
  document.querySelectorAll('.btn-del-prod').forEach(b=>b.onclick=()=>{
    if(confirm('¿Eliminar este producto?')){
      S.prods=S.prods.filter(x=>x.id!==+b.dataset.id);
      saveData();renderSidebar();renderPage();toast('Producto eliminado','warn');
    }
  });
}

function toggleFilter(key,val){S[key]=S[key]===val?'':val;renderPage();}

// ─── MODAL HELPERS ───

function saveCot(){
  if(S.ncL.length===0){toast('Agrega al menos un producto','error');return;}
  const oc=nextOC();
  const total=S.ncL.reduce((s,l)=>s+(l.fob||0),0);
  const cot={
    id:Date.now(),oc,fv:'',ano:curYear(),fecha:todayDisp(),
    cliente:S.ncC||'',notas:S.ncN||'',
    estado:'Stand By',lineas:S.ncL.length,
    totalFob:total,totalUsd:0,
    detalle:S.ncL.map(l=>({...l}))
  };
  S.cots.unshift(cot);
  closeModal();saveData();renderSidebar();renderPage();
  toast('Cotización '+oc+' guardada como Stand By ✓');
}

function onAlSku(){
  try{
  const sku=document.getElementById('al-sku')?.value||'';
  console.log('onAlSku fired, sku='+sku+', prods='+S.prods.length);
  const p=S.prods.find(x=>x.sku===sku);
  const prev=document.getElementById('prod-preview');
  if(p&&sku!=='nuevo'){
    document.getElementById('al-prod').value=p.n||'';
    document.getElementById('al-rmb').value=p.rmb||'';
    document.getElementById('al-car').value=p.d||'';
    if(prev){
      prev.style.display='flex';
      document.getElementById('pp-nom').textContent=p.n+(p.ne?' / '+p.ne:'');
      document.getElementById('pp-car').textContent=p.d||'';
      const foto=document.getElementById('pp-foto');
      if(foto) foto.innerHTML=p.fotos&&p.fotos[0]?'<img src="'+p.fotos[0]+'" style="width:48px;height:48px;border-radius:8px;object-fit:cover;">':'<i class="ti ti-package" style="font-size:20px;color:var(--bd);"></i>';
    }
    updTotal();
  } else {
    if(prev) prev.style.display='none';
    document.getElementById('al-prod').value='';
    document.getElementById('al-rmb').value='';
  }
  }catch(e){console.error('onAlSku error:',e);}
}

function saveLine(){
  const prod=document.getElementById('al-prod')?.value||'';
  const qty=+(document.getElementById('al-qty')?.value||0);
  const rmb=+(document.getElementById('al-rmb')?.value||0);
  const sku=document.getElementById('al-sku')?.value||'';
  const car=document.getElementById('al-car')?.value||'';
  const un=document.getElementById('al-un')?.value||'PCS';
  const aut=document.getElementById('al-aut')?.value||'';
  if(!prod){toast('Descripción del producto es obligatoria','error');return;}
  if(!qty){toast('Cantidad es obligatoria','error');return;}
  if(!rmb){toast('Precio RMB es obligatorio','error');return;}
  const fob=qty*rmb;
  S.ncL.push({sku:sku!=='nuevo'?sku:'',p:prod,d:car,qty,u:un,rmb,fob,aut});
  openModal(modalNewCot());
}
function bindModal(){
  document.getElementById('modal-bg').onclick=e=>{if(e.target===document.getElementById('modal-bg'))closeModal();};
  document.querySelectorAll('.modal-close,.btn-modal-close').forEach(b=>b.onclick=closeModal);
  // new cot
  if(document.getElementById('btn-add-line')) document.getElementById('btn-add-line').onclick=()=>openModal(modalAddLine());
  document.querySelectorAll('.btn-del-line').forEach(b=>b.onclick=()=>{S.ncL.splice(+b.dataset.i,1);openModal(modalNewCot());});
  if(document.getElementById('btn-save-cot')) document.getElementById('btn-save-cot').onclick=_saveCot;
  if(document.getElementById('nc-cliente')) document.getElementById('nc-cliente').oninput=e=>{S.ncC=e.target.value;};
  if(document.getElementById('nc-notas')) document.getElementById('nc-notas').oninput=e=>{S.ncN=e.target.value;};
  // add line
  if(document.getElementById('al-sku')) document.getElementById('al-sku').onchange=_onAlSku;
  if(document.getElementById('al-qty')) document.getElementById('al-qty').oninput=_updTotal;
  if(document.getElementById('al-rmb')) document.getElementById('al-rmb').oninput=_updTotal;
  if(document.getElementById('btn-save-line')) document.getElementById('btn-save-line').onclick=saveLine;
  // prod
  if(document.getElementById('btn-save-prod')) document.getElementById('btn-save-prod').onclick=saveProd;
  if(document.getElementById('fi-foto')) document.getElementById('fi-foto').onchange=function(){addFoto(this);};
  // ver cot
  document.querySelectorAll('.btn-apro-modal').forEach(b=>b.onclick=()=>{
    const c=S.cots.find(x=>x.id===+b.dataset.id);
    if(c){c.estado='En proceso';saveData();renderSidebar();renderPage();closeModal();toast('Aprobada → importación activa ✓');}
  });
  document.querySelectorAll('.btn-recha-modal').forEach(b=>b.onclick=()=>{
    const c=S.cots.find(x=>x.id===+b.dataset.id);
    if(c){c.estado='Rechazada';saveData();renderSidebar();renderPage();closeModal();toast('Rechazada','warn');}
  });
}

  const foto=p?.fotos?.[0]||'';
  return `<div class="cot-line">
    <div class="cot-foto">${foto?`<img src="${foto}" alt="">`:
      `<i class="ti ${icons[p?.g]||icons.default}"></i>`}</div>

        ${(l.sku||l.s)?`<span class="cot-sku">${l.sku||l.s}</span>`:''}

function modalProd(p){
  const d=p||{};
  const gs=['Equipos','Herramientas','Accesorios','Almacenamiento','Construcción','Agricultura','Seguridad','Otros'];
  const cbmU = (d.ancho&&d.alto&&d.fondo) ? (d.ancho*d.alto*d.fondo/1000000) : 0;
  const cbmDisp = cbmU ? cbmU.toFixed(4) : '—';
  const CONTS=[{name:"20'",pMax:28000,vol:28.12},{name:"40'",pMax:28000,vol:57.43},{name:"40' HQ",pMax:28000,vol:64.64}];
  const contsCalc = (cbmU&&d.peso) ? CONTS.map(c=>{
    const pp=Math.floor(c.pMax/d.peso), pc=Math.floor(c.vol/cbmU);
    const qty=Math.min(pp,pc), lim=pp<=pc?'Peso':'CBM';
    return {name:c.name,qty,pp,pc,lim};
  }) : null;

  var h = '';
  h += '<div class="modal-head">';
  h += '<div><div class="modal-title">'+(d.id?'Edit':'Nuevo')+' Producto</div></div>';

  // Main fields grid
  h += '<div class="form-grid">';

  h += '<div class="form-group"><label class="form-label">Precio RMB ¥</label><input class="form-input" id="p-rmb" type="number" value="'+(d.rmb||0)+'"></div>';
  h += '<div class="form-group"><label class="form-label">Nombre Español *</label><input class="form-input" id="p-nom" value="'+(d.n||'')+'" placeholder="Nombre en español..."></div>';
  h += '<div class="form-group"><label class="form-label">Nombre Inglés</label><input class="form-input" id="p-ne" value="'+(d.ne||'')+'" placeholder="Name in English..."></div>';
  h += '<div class="form-group"><label class="form-label">Grupo</label><select class="form-input" id="p-grp">'+gs.map(g=>'<option value="'+g+'"'+(d.g===g?' selected':'')+'>'+g+'</option>').join('')+'</select></div>';
  h += '<div class="form-group"><label class="form-label">Subpartida Arancelaria</label><input class="form-input" id="p-sub" value="'+(d.sub||'')+'"></div>';
  h += '<div class="form-group full"><label class="form-label">Descripción / Características</label><textarea class="form-input form-textarea" id="p-desc">'+(d.d||'')+'</textarea></div>';
  h += '</div>';

  h += '<div style="background:var(--dp);border-radius:10px;padding:13px;margin-top:12px;">';
  h += '<div style="font-size:11px;font-weight:600;color:var(--v);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px;">';
  h += '<i class="ti ti-ruler-3" style="font-size:15px;color:var(--d);"></i>Dimensiones y Peso · Cálculo de Containers</div>';

  h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:12px;">';
  h += '<div><label class="form-label">Ancho (cm)</label><input class="form-input" id="p-ancho" type="number" step="0.1" value="'+(d.ancho||'')+'" placeholder="0" data-action="upd-cbm"></div>';
  h += '<div><label class="form-label">Alto (cm)</label><input class="form-input" id="p-alto" type="number" step="0.1" value="'+(d.alto||'')+'" placeholder="0" data-action="upd-cbm"></div>';
  h += '<div><label class="form-label">Fondo (cm)</label><input class="form-input" id="p-fondo" type="number" step="0.1" value="'+(d.fondo||'')+'" placeholder="0" data-action="upd-cbm"></div>';
  h += '<div><label class="form-label">Peso unit. (kg)</label><input class="form-input" id="p-peso" type="number" step="0.01" value="'+(d.peso||'')+'" placeholder="0" data-action="upd-cbm"></div>';

  // Container grid
  h += '<div id="cont-grid">';

  h += '<div style="background:var(--dp);border-radius:10px;padding:13px;margin-top:12px;">';

  h += '<input type="file" id="fi-foto" accept="image/*" multiple style="display:none;">';
  h += '<i class="ti ti-camera" style="font-size:26px;color:var(--tl);display:block;margin-bottom:5px;"></i>';
  h += '<div style="font-size:12.5px;color:var(--tl);">Toca para subir fotos</div></div>';
  if((d.fotos||[]).length>0){
    h += '<div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;">';
    (d.fotos||[]).forEach(function(f,i){
      h += '<div style="position:relative;"><img src="'+f+'" style="width:54px;height:54px;border-radius:7px;object-fit:cover;" alt="foto">';
      h += '<button data-action="del-foto" data-id="'+d.id+'" data-idx="'+i+'" style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;border:none;background:#c0392b;color:#fff;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;"><i class="ti ti-x" style="font-size:9px;"></i></button></div>';
    });
    h += '</div>';
  }
  h += '</div>';
  h += '<input type="hidden" id="p-id" value="'+(d.id||'')+'">';
  h += '</div>';
  h += '<div class="modal-foot"><button class="btn btn-out btn-sm btn-modal-close" onclick="closeModal()">Cancel</button>';
  h += '<button class="btn btn-gold btn-sm" id="btn-save-prod"><i class="ti ti-device-floppy"></i>Guardar</button></div>';
  return h;
}

function saveProd(){
  const sku=document.getElementById('p-sku')?.value||'';
  const nom=document.getElementById('p-nom')?.value||'';
  if(!sku||!nom){toast('SKU y Nombre son obligatorios','error');return;}
  const id=document.getElementById('p-id')?.value;
  const ex=id?S.prods.find(x=>x.id===+id):null;
  const prod={
    id:ex?.id||Date.now(),sku,n:nom,
    ne:document.getElementById('p-ne')?.value||'',
    g:document.getElementById('p-grp')?.value||'Otros',
    rmb:parseFloat(document.getElementById('p-rmb')?.value)||0,
    d:document.getElementById('p-desc')?.value||'',
    sub:document.getElementById('p-sub')?.value||'',
    ancho:parseFloat(document.getElementById('p-ancho')?.value)||0,
    alto:parseFloat(document.getElementById('p-alto')?.value)||0,
    fondo:parseFloat(document.getElementById('p-fondo')?.value)||0,
    peso:parseFloat(document.getElementById('p-peso')?.value)||0,
    apro:'Aprobado',fotos:ex?.fotos||[]
  };
  if(ex){const i=S.prods.findIndex(x=>x.id===ex.id);if(i>=0)S.prods[i]=prod;}
  else S.prods.unshift(prod);
  closeModal();saveData();renderSidebar();renderPage();
  toast(ex?'Producto actualizado':'Producto creado ✓');
}

function addFoto(input){
  const id=document.getElementById('p-id')?.value;
  const p=id?S.prods.find(x=>x.id===+id):null;
  const target=p||(S.prods.find(x=>x.sku===document.getElementById('p-sku')?.value)||null);
  Array.from(input.files||[]).forEach(f=>{
    if(!target){toast('Guarda el producto primero','warn');return;}
    if((target.fotos||[]).length>=5){toast('Máximo 5 fotos','warn');return;}
    const r=new FileReader();
    r.onload=e=>{
      if(!target.fotos)target.fotos=[];
      target.fotos.push(e.target.result);
      if(p){const i=S.prods.findIndex(x=>x.id===p.id);if(i>=0)S.prods[i]=target;}
      saveData();openModal(modalProd(target));
    };r.readAsDataURL(f);
  });
}

function delFoto(prodId,idx){
  const p=S.prods.find(x=>x.id===prodId);
  if(p?.fotos){p.fotos.splice(idx,1);saveData();openModal(modalProd(p));}
}

function calcCIF(oc){
  var fob = oc.totalFob;
  var qty_total = (oc.detalle||[]).reduce(function(s,l){return s+(l.qty||0);},0) || oc.lineas;
  var commission = fob * 0.065;
  var commission2 = fob * 0.065;
  var totalOcean=0, totalContUsd=0, totalLocal=0, totalInsurance=0, totalTruck=0;
  S.cifConts.forEach(function(c){
    totalOcean += c.ocean||0;
    totalContUsd += (c.contUsd||0)*S.cifTRM;
    totalLocal += c.local||0;
    totalInsurance += c.insurance||0;
    totalTruck += c.truck||0;
  });
  var totalFlete = totalOcean+totalContUsd+totalLocal+totalInsurance+totalTruck;
  var totalSinJAH = fob+commission+commission2+totalFlete;
  var jah = fob*0.07;
  var totalCIF_RMB = totalSinJAH+jah;
  var pctIncr = fob>0 ? ((totalCIF_RMB-fob)/fob*100) : 0;
  var totalCIF_USD = totalCIF_RMB/S.cifTRM;
  var cifUnUSD = qty_total>0 ? (totalCIF_RMB/S.cifTRM/qty_total) : 0;
  var cifUnCOP = cifUnUSD*S.cifCOP;

  function row(lbl,val,bold,sub){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid rgba(26,58,46,.06);">'+
      '<div><div style="font-size:12.5px;color:'+(bold?'var(--v)':'var(--tm)')+';font-weight:'+(bold?'600':'400')+';">'+lbl+'</div>'+
      (sub?'<div style="font-size:10px;color:var(--tl);">'+sub+'</div>':'')+
      '</div><div style="font-size:'+(bold?'15px':'13px')+';font-weight:'+(bold?'700':'500')+';color:'+(bold?'var(--v)':'var(--tm)')+';">'+val+'</div></div>';
  }
  function rowTotal(lbl,val,color){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--v);border-radius:8px;margin:6px 0;">'+
      '<div style="color:rgba(232,220,200,.7);font-size:11px;text-transform:uppercase;letter-spacing:.5px;">'+lbl+'</div>'+
      '<div style="color:'+(color||'var(--d)')+';font-size:18px;font-weight:700;">'+val+'</div></div>';
  }

  var h = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';

  // Columna izquierda
  h += '<div>';
  h += '<div style="font-size:11px;font-weight:600;color:var(--v);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--d);">Desglose de Costos RMB</div>';
  h += row('FOB Total', fR(fob), true, qty_total.toLocaleString()+' units');
  h += row('Comisión Aily 6.5%', fR(commission), false, fR(fob)+' × 6.5%');
  h += row('Comisión Rafa 6.5%', fR(commission2), false, fR(fob)+' × 6.5%');
  h += row('Ocean Fee', fR(totalOcean), false, S.cifConts.length+' contenedor(es)');
  h += row('Container USD → RMB', fR(totalContUsd), false, '× TRM ¥'+S.cifTRM);
  h += row('Local Charge (incl. truck)', fR(totalLocal));
  h += row('Insurance Fee', fR(totalInsurance));
  h += row('Truck Fee', fR(totalTruck));
  h += '<div style="border-top:2px solid var(--d);margin:6px 0;"></div>';
  h += row('Total Flete', fR(totalFlete), true);
  h += row('Total SIN JAH', fR(totalSinJAH), true, 'FOB + Comisiones + Flete');
  h += row('JAH 7% (sobre FOB)', fR(jah), false, fR(fob)+' × 7%');
  h += '</div>';

  // Columna derecha
  h += '<div>';
  h += '<div style="font-size:11px;font-weight:600;color:var(--v);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--d);">Resultados Finales</div>';
  h += rowTotal('TOTAL CIF RMB', fR(totalCIF_RMB));
  h += '<div style="padding:8px 0;">';
  h += row('% Incremento FOB vs CIF', pctIncr.toFixed(2)+'%', true, 'Referencia de margen');
  h += row('TRM utilizado', '¥'+S.cifTRM+' / USD');
  h += '</div>';
  h += rowTotal('TOTAL CIF USD', fU(totalCIF_USD), '#e8c84a');
  h += '<div style="padding:8px 0;">';
  h += row('Precio CIF/UN USD', fU(cifUnUSD), true, fR(totalCIF_RMB)+' ÷ ¥'+S.cifTRM+' ÷ '+qty_total.toLocaleString()+' uds');
  h += row('TRM COP', '$'+fN(S.cifCOP,0));
  h += '</div>';
  h += rowTotal('PRECIO CIF/UN COP', '$'+fN(cifUnCOP,0), '#e8dcc8');
  h += '<div style="background:var(--dp);border-radius:9px;padding:12px;margin-top:10px;">';
  h += '<div style="font-size:10px;font-weight:600;color:var(--vm);text-transform:uppercase;margin-bottom:8px;">Resumen Ejecutivo</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  h += '<div style="text-align:center;background:#fff;border-radius:7px;padding:10px;"><div style="font-size:9px;color:var(--tl);text-transform:uppercase;margin-bottom:3px;">CIF Total USD</div><div style="font-size:16px;font-weight:700;color:var(--v);">'+fU(totalCIF_USD)+'</div></div>';
  h += '<div style="text-align:center;background:#fff;border-radius:7px;padding:10px;"><div style="font-size:9px;color:var(--tl);text-transform:uppercase;margin-bottom:3px;">Precio/UN USD</div><div style="font-size:16px;font-weight:700;color:var(--v);">'+fU(cifUnUSD)+'</div></div>';
  h += '<div style="text-align:center;background:#fff;border-radius:7px;padding:10px;"><div style="font-size:9px;color:var(--tl);text-transform:uppercase;margin-bottom:3px;">Precio/UN COP</div><div style="font-size:16px;font-weight:700;color:var(--v);">$'+fN(cifUnCOP,0)+'</div></div>';
  h += '<div style="text-align:center;background:#fff;border-radius:7px;padding:10px;"><div style="font-size:9px;color:var(--tl);text-transform:uppercase;margin-bottom:3px;">% Incremento</div><div style="font-size:16px;font-weight:700;color:'+(pctIncr>30?'#c0392b':'#2e7d32')+';">'+pctIncr.toFixed(1)+'%</div></div>';
  h += '</div></div></div>';
  h += '</div>';
  return h;
}

function onCifOC(){
  var v = document.getElementById('cif-oc') ? document.getElementById('cif-oc').value : '';
  S.cifSel = v ? +v : null;
  if(S.cifSel){
    var oc = S.cots.find(function(x){return x.id===S.cifSel;});
    if(oc && OC_CONTS[oc.oc]){
      S.cifConts = OC_CONTS[oc.oc].map(function(c){return Object.assign({},c);});
    } else {
      S.cifConts = [];
    }
  } else {
    S.cifConts = [];
  }
  renderPage();
}

function addCifCont(){
  S.cifConts.push({num:S.cifConts.length+1, ocean:0, contUsd:0, local:0, insurance:0, truck:0});
  renderPage();
}

// ─── CIF FIRME FUNCTIONS ───
function dejarEnFirme(ocId){
  if(!ocId){toast('Select a PO primero','warn');return;}
  var oc = S.cots.find(function(x){return x.id===ocId;});
  if(!oc) return;
  var confirmed = confirm('¿Dejar en FIRME la liquidación CIF de la OC '+oc.oc+'?\n\nUna vez en firme NO se podrán hacer cambios.\nSolo el administrador podrá desbloquearla con clave especial.\n\n¿Confirmar?');
  if(!confirmed) return;
  var fecha = new Date().toLocaleDateString('es-CO',{year:'numeric',month:'2-digit',day:'2-digit'});
  S.cifFirmes[ocId] = {fecha:fecha, usuario:S.user.n, trm:S.cifTRM, cop:S.cifCOP, conts:JSON.parse(JSON.stringify(S.cifConts))};
  saveCIFFirmes();
  toast('Liquidación OC '+oc.oc+' dejada EN FIRME · '+fecha);
  renderPage();
}

function unlockCIF(ocId){
  var oc = S.cots.find(function(x){return x.id===ocId;});
  if(!oc) return;
  var firme = S.cifFirmes[ocId];
  if(!firme) return;
  var clave = prompt('DESBLOQUEAR liquidación CIF · OC '+oc.oc+'\n\nAprobada por: '+firme.usuario+' · '+firme.fecha+'\n\nIngrese la clave de administrador:');
  if(clave === null) return;
  if(clave === 'montana2024'){
    delete S.cifFirmes[ocId];
    saveCIFFirmes();
    toast('Liquidación OC '+oc.oc+' desbloqueada','warn');
    renderPage();
  } else {
    toast('Clave incorrecta — no se pudo desbloquear','error');
  }
}

function saveCIFFirmes(){
  try{localStorage.setItem('mt_cif_firmes',JSON.stringify(S.cifFirmes));}catch(e){}
}

function loadCIFFirmes(){
  try{var d=localStorage.getItem('mt_cif_firmes');if(d)S.cifFirmes=JSON.parse(d);}catch(e){}
}

function nextBLId(){
  return S.bls.length > 0 ? Math.max(...S.bls.map(b=>b.id))+1 : 1;
}

function blTrackingURL(naviera, blNum){
  if(!naviera||!blNum) return '';
  const base = NAVIERAS[naviera];
  return base ? base+blNum : '';
}

function pageBL(){
  var isAdm = isAdmin();

  // Filter OCs with at least one unassigned line
  var ocs_avail = S.cots.filter(function(c){

    if(ocL.length===0) return true;
    var ac=0;
    ocL.forEach(function(l,i){
      if(S.bls.some(function(b){return b.ocId===c.id&&(b.lines||[]).some(function(bl){return bl.lineIdx===i&&!bl.isSplit;});})) ac++;
    });
    return ac<ocL.length;

  h += '<div style="display:flex;align-items:center;gap:14px;">';

  h += '<div><div style="font-size:17px;font-weight:600;color:var(--be);">BL Management</div>';

function openModalBL(blData){
  var d = blData || {};
  var currentId = d.id||null;
  var ocs_ok = S.cots.filter(function(c){
    if(c.estado!=='En proceso'&&c.estado!=='Completada') return false;
    var ocLines = (c.detalle||[]).filter(function(l){return l.p||l.producto;});
    if(ocLines.length===0) return true;
    var assignedCount = 0;
    ocLines.forEach(function(l,i){
      var isFullyAssigned = S.bls.some(function(b){
        return b.ocId===c.id && b.id!==currentId && (b.lines||[]).some(function(bl){return bl.lineIdx===i && !bl.isSplit;});
      });
      if(isFullyAssigned) assignedCount++;
    });
    return assignedCount < ocLines.length;
  });
  window._blState = {
    ocId: d.ocId||null,
    lines: d.lines ? JSON.parse(JSON.stringify(d.lines)) : [],
    conts: d.conts ? JSON.parse(JSON.stringify(d.conts)) : [],
    etapa: d.etapa||'Booking Confirmed',
    id: currentId,
  };
  renderModalBL(d, ocs_ok);
}

function splitBLLine(lineIdx, maxQty){
  var currentForm = {
    id: window._blState.id,
    blNum: document.getElementById('bl-num')?.value||'',
    naviera: document.getElementById('bl-naviera')?.value||'',
    vessel: document.getElementById('bl-vessel')?.value||'',
    voyageNo: document.getElementById('bl-voyage')?.value||'',
    etd: document.getElementById('bl-etd')?.value||'',
    eta: document.getElementById('bl-eta')?.value||'',
    origen: document.getElementById('bl-origen')?.value||'',
    bookingRef: document.getElementById('bl-booking')?.value||'',
    trackUrl: document.getElementById('bl-trackurl')?.value||'',
    pdfUrl: document.getElementById('bl-pdf')?.value||'',
  };
  var newQty = prompt('Split line — enter QTY for THIS BL (max '+maxQty+'):\nRemaining will stay in PO for a future BL.', maxQty);
  if(newQty===null) return;
  newQty = Math.min(Math.max(1,+newQty), maxQty-1);
  if(!newQty||isNaN(newQty)){toast('Invalid quantity','error');return;}
  var state = window._blState;
  var line = state.lines.find(function(sl){return sl.lineIdx===lineIdx;});
  if(line){
    line.qtySel = newQty;
    line.isSplit = true;
  } else {
    var selOC = S.cots.find(function(c){return c.id===state.ocId;});
    var ocLines = (selOC.detalle||[]).filter(function(l){return l.p||l.producto;});
    var l = ocLines[lineIdx];
    state.lines.push({lineIdx:lineIdx, sku:l.sku||l.s, producto:l.p||l.producto, qtyOrig:maxQty, qtySel:newQty, cont:'', isSplit:true});
  }
  var ocs_ok = S.cots.filter(function(c){
    if(c.estado!=='En proceso'&&c.estado!=='Completada') return false;
    var ocL=(c.detalle||[]).filter(function(l){return l.p||l.producto;});
    if(ocL.length===0) return true;
    var ac=0;
    ocL.forEach(function(l2,i){
      if(S.bls.some(function(b){return b.ocId===c.id&&b.id!==(window._blState&&window._blState.id)&&(b.lines||[]).some(function(bl){return bl.lineIdx===i&&!bl.isSplit;});})) ac++;
    });
    return ac<ocL.length;
  });
  renderModalBL(currentForm, ocs_ok);
  toast('Line split: '+newQty+' in this BL, '+(maxQty-newQty)+' remaining','warn');
}

var _blConts = [];

function addContBL(){
  _blConts = getBLContsFromForm();

  _blConts.push({num:_blConts.length+1,tipo:"40'HQ",numFisico:'',cbm:0,peso:0});

  if(wrap){

function removeContBL(idx){
  _blConts = getBLContsFromForm();
  _blConts.splice(idx,1);
  var wrap=document.getElementById('bl-conts-wrap');
  if(wrap){
    wrap.innerHTML='';
    _blConts.forEach(function(c,i){ wrap.innerHTML+=renderContBLRow(c,i,_blConts.length); });
  }
  updBLTotals();

function getBLContsFromForm(){
  var conts=[];
  var i=0;
  while(document.getElementById('bl-cont-tipo-'+i)){
    conts.push({
      num:i+1,
      tipo:document.getElementById('bl-cont-tipo-'+i).value,
      numFisico:document.getElementById('bl-cont-num-'+i).value||'',
      cbm:+(document.getElementById('bl-cont-cbm-'+i).value)||0,
      peso:+(document.getElementById('bl-cont-peso-'+i).value)||0,
    });
    i++;
  }
  return conts;
}

function updBLTotals(){
  var conts=getBLContsFromForm();
  var tcbm=conts.reduce(function(s,c){return s+(+c.cbm||0);},0);
  var tpeso=conts.reduce(function(s,c){return s+(+c.peso||0);},0);
  var tc=document.getElementById('bl-total-cbm');
  var tp=document.getElementById('bl-total-peso');
  if(tc) tc.textContent=tcbm.toFixed(2)+' m³';
  if(tp) tp.textContent=tpeso.toFixed(0)+' kg';
}

function updTrackURL(){
  var nav=document.getElementById('bl-naviera')?.value||'';

  var url=blTrackingURL(nav,blnum);

function saveBL(){
  var state = window._blState||{};
  var ocId = state.ocId || +(document.getElementById('bl-oc-id')?.value||0);
  var blNum = document.getElementById('bl-num')?.value||'';
  var vessel = document.getElementById('bl-vessel')?.value||'';
  var naviera = document.getElementById('bl-naviera')?.value||'';
  if(!ocId){toast('Select a PO','error');return;}
  if(!blNum){toast('BL Number is required','error');return;}
  if(!vessel){toast('Vessel is required','error');return;}
  if(!state.lines||state.lines.length===0){toast('Select at least one PO line','error');return;}

  // Collect final line quantities from inputs
  var finalLines = (state.lines||[]).map(function(sl){
    var qtyInp = document.getElementById('bl-line-qty-'+sl.lineIdx);
    var contInp = document.getElementById('bl-line-cont-'+sl.lineIdx);
    return {
      lineIdx: sl.lineIdx,
      sku: sl.sku,
      producto: sl.producto,
      qtyOrig: sl.qtyOrig,
      qtySel: qtyInp ? +(qtyInp.value||sl.qtySel) : sl.qtySel,
      cont: contInp ? (contInp.value||'') : (sl.cont||''),
      isSplit: sl.isSplit||false,
    };
  });

  var trackUrl = document.getElementById('bl-trackurl')?.value||blTrackingURL(naviera,blNum);
  var totalCBM = +(document.getElementById('bl-cbm')?.value||0);
  var totalPeso = +(document.getElementById('bl-peso')?.value||0);

  // Build conts array from unique container numbers in lines
  var contNums = [...new Set(finalLines.map(function(l){return l.cont;}).filter(Boolean))];
  var conts = contNums.map(function(num,i){return {num:i+1,numFisico:num,tipo:"40'HQ",cbm:0,peso:0};});
  if(conts.length===0) conts=[{num:1,numFisico:'',tipo:"40'HQ",cbm:0,peso:0}];

  var id = state.id || 0;
  var bl = {
    id: id||nextBLId(),
    ocId: ocId,
    blNum: blNum,
    naviera: naviera,
    vessel: vessel,
    voyageNo: document.getElementById('bl-voyage')?.value||'',
    etd: document.getElementById('bl-etd')?.value||'',
    eta: document.getElementById('bl-eta')?.value||'',
    origen: document.getElementById('bl-origen')?.value||'',
    bookingRef: document.getElementById('bl-booking')?.value||'',
    trackUrl: trackUrl,
    pdfUrl: document.getElementById('bl-pdf')?.value||'',
    etapa: state.etapa||'Booking Confirmed',
    lines: finalLines,
    conts: conts,
    totalCBM: totalCBM,
    totalPeso: totalPeso,
    fechaCreacion: new Date().toISOString().split('T')[0],
    creadoPor: S.user.n,
  };

  if(id){
    var idx2=S.bls.findIndex(function(b){return b.id===id;});
    if(idx2>=0) S.bls[idx2]=bl;
  } else {
    S.bls.push(bl);
  }
  closeModal();
  saveData();
  renderSidebar();
  renderPage();
  toast('BL '+bl.blNum+' saved ✅');
}

    return;
  }
  var gh='<div style="font-size:10px;font-weight:600;color:var(--v);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;">Capacidad por Contenedor</div>';
  gh+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">';
  CONTS.forEach(function(c){
    const pp=Math.floor(c.pMax/pe);
    const pc=Math.floor(c.vol/cbmU);
    const qty=Math.min(pp,pc);
    const lim=pp<=pc?'Peso':'CBM';
    gh+='<div style="background:#fff;border-radius:8px;padding:11px;border:0.5px solid rgba(26,58,46,.12);text-align:center;">';
    gh+='<div style="font-size:12px;font-weight:700;color:var(--v);margin-bottom:6px;">'+c.name+'</div>';
    gh+='<div style="font-size:24px;font-weight:700;color:var(--d);">'+qty.toLocaleString()+'</div>';
    gh+='<div style="font-size:10px;color:var(--tl);margin-top:2px;">units</div>';
    gh+='<div style="font-size:10px;margin-top:5px;padding:2px 8px;border-radius:10px;display:inline-block;background:'+(lim==='Peso'?'#fff3e0':'#e3f2fd')+';color:'+(lim==='Peso'?'#e65100':'#1565c0')+';">Limit by '+lim+'</div>';
    gh+='<div style="font-size:9px;color:var(--tl);margin-top:4px;">Peso: '+pp.toLocaleString()+' · CBM: '+pc.toLocaleString()+'</div>';
    gh+='</div>';
  });
  gh+='</div>';
  grid.innerHTML=gh;
}

  }
});

// ─── EVENT DELEGATION (fixes Vercel CSP blocking inline onclick) ───
document.addEventListener('click', function(e){
  var el = e.target.closest('[data-action]');
  if(!el) return;
  var action = el.dataset.action;
  var id = el.dataset.id ? +el.dataset.id : null;
  console.log('DELEGATION CLICK:', action, id);
  console.trace('delegation stack');

  if(action==='new-bl'){ openModalBL(null); }
  else if(action==='ver-bl'){ verBL(id); }
  else if(action==='edit-bl'){ editEtapaBL(id); }
  else if(action==='save-bl'){ saveBL(); }
  else if(action==='clear-bl-filter'){ S.blSearch='';S.blEtapa='';renderPage(); }
  else if(action==='clear-prod-filter'){ S.pS='';S.pG='';renderPage(); }
  else if(action==='clear-cot-filter'){ S.fS='';S.fE='';S.fA='';renderPage(); }
  else if(action==='add-cif-cont'){ addCifCont(); }
  else if(action==='export-cif'){ exportCIF(); }
  else if(action==='dejar-firme'){ dejarEnFirme(id); }
  else if(action==='unlock-cif'){ unlockCIF(id); }
  else if(action==='del-cif-cont'){ S.cifConts.splice(id,1);renderPage(); }
  else if(action==='toggle-bl-line'){ toggleBLLine(id); }
  else if(action==='split-bl-line'){ splitBLLine(id, +el.dataset.max); }
  else if(action==='bl-etapa-btn'){
    document.querySelectorAll('.bl-etapa-btn').forEach(function(b){
      var c2=BL_ETAPA_COLORS[b.dataset.etapa];
      b.style.background='#f0ede6'; b.style.color=c2.color;
    });
    var col2=BL_ETAPA_COLORS[el.dataset.etapa];
    el.style.background=col2.color; el.style.color='#fff';
    if(window._blState) window._blState.etapa=el.dataset.etapa;
  }
  else if(action==='edit-prod'){
    var p=S.prods.find(function(x){return x.id===id;});
    if(p) openModal(modalProd(p));
  }
  else if(action==='del-prod'){
    if(confirm('Delete this product?')){
      S.prods=S.prods.filter(function(x){return x.id!==id;});
      saveData();renderPage();toast('Product deleted','warn');
    }
  }
  else if(action==='del-foto'){ delFoto(id,+el.dataset.idx); }
  else if(action==='ver-cot'){ openModal(modalVerCot(id)); }
  else if(action==='export-pdf'){ exportPDF(id); }
  else if(action==='foto-click'){ updFotoClick(); }
  else if(action==='del-line'){ S.ncL.splice(id,1);openModal(modalNewCot()); }
  else if(action==='apro-cot-modal'){
    var c=S.cots.find(function(x){return x.id===id;});
    if(c){c.estado='En proceso';saveData();renderSidebar();renderPage();closeModal();toast('Approved → active import ✓');}
  }
  else if(action==='recha-cot-modal'){
    var c=S.cots.find(function(x){return x.id===id;});
    if(c){c.estado='Rechazada';saveData();renderSidebar();renderPage();closeModal();toast('Rejected','warn');}
  }
  else if(action==='new-cot'){
    S.ncL=[];S.ncC='';S.ncN='';openModal(modalNewCot());
  }
  else if(action==='new-prod'){ openModal(modalProd(null)); }
});
