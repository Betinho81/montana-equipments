<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana Equipments — Sistema de Gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --v:#1a3a2e;--vm:#2d5c47;--vl:#3d7a60;
  --d:#c9a227;--dl:#e8c84a;--dp:#f5e9c0;--dpp:#fdf6e3;
  --be:#e8dcc8;--bd:#d4c5a9;--cr:#faf7f0;
  --bo:rgba(26,58,46,0.12);--boh:rgba(26,58,46,0.22);
  --td:#1a1a1a;--tm:#4a4a4a;--tl:#8a8a8a;
  --white:#ffffff;
  --sh:0 1px 3px rgba(26,58,46,0.08),0 4px 12px rgba(26,58,46,0.06);
  --sh2:0 2px 8px rgba(26,58,46,0.12),0 8px 24px rgba(26,58,46,0.08);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cr);color:var(--td);font-size:14px;line-height:1.5;}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;background:var(--v);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
}
#login-screen.hidden{display:none;}
.login-card{
  background:var(--white);border-radius:20px;
  padding:40px;width:380px;
  border-top:5px solid var(--d);
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.login-circ{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--d);background:var(--v);
  display:flex;align-items:center;justify-content:center;
  color:var(--d);font-size:22px;flex-shrink:0;
}
.login-brand{font-size:19px;font-weight:600;color:var(--v);}
.login-sub{font-size:10px;color:#aaa;letter-spacing:2.5px;text-transform:uppercase;margin-top:1px;}
.login-label{font-size:11px;font-weight:600;color:var(--v);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:5px;margin-top:14px;}
.login-input{
  width:100%;padding:10px 14px;
  border:1px solid var(--bd);border-radius:9px;
  font-size:13.5px;background:var(--cr);
  font-family:'DM Sans',sans-serif;outline:none;color:var(--td);
  transition:border-color .15s,background .15s;
}
.login-input:focus{border-color:var(--d);background:var(--white);}
.login-btn{
  width:100%;padding:12px;margin-top:20px;
  background:var(--v);color:var(--d);
  border:none;border-radius:9px;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s;
}
.login-btn:hover{background:var(--vm);}
.login-div{border:none;border-top:1px solid #eee;margin:20px 0 14px;}
.login-qtit{font-size:10px;color:#bbb;text-align:center;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
.login-qbtn{
  width:100%;padding:10px 14px;margin-bottom:7px;
  border:1px solid var(--bd);border-radius:9px;
  background:var(--cr);cursor:pointer;
  font-size:12.5px;color:var(--v);
  display:flex;align-items:center;gap:10px;
  font-family:'DM Sans',sans-serif;
  transition:background .15s,border-color .15s;
}
.login-qbtn:hover{background:var(--dp);border-color:var(--d);}
.login-qbtn b{display:block;font-weight:600;font-size:13px;}
.login-qbtn span{font-size:11px;color:#999;}
.login-err{color:#c0392b;font-size:12px;text-align:center;margin-top:8px;display:none;}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;}
.topbar{
  background:var(--v);height:54px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:3px solid var(--d);
  flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--d);background:var(--vm);
  display:flex;align-items:center;justify-content:center;
  color:var(--d);font-size:15px;
}
.tb-name{font-size:15px;font-weight:600;color:var(--be);}
.tb-ver{font-size:9px;color:var(--d);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-user{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(201,162,39,.25);
  border-radius:20px;padding:5px 12px;
}
.tb-uname{font-size:12px;color:var(--be);}
.tb-role{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--d);color:var(--v);}
.tb-logout{
  font-size:12px;color:rgba(232,220,200,.5);cursor:pointer;
  padding:5px 10px;border:1px solid rgba(232,220,200,.18);
  border-radius:7px;background:transparent;
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;gap:5px;
  transition:color .15s;
}
.tb-logout:hover{color:var(--d);}

.body-wrap{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:190px;background:var(--v);padding:12px 0;overflow-y:auto;flex-shrink:0;}
.sb-section{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(201,162,39,.5);font-weight:600;padding:0 14px;margin:10px 0 4px;display:block;}
.sb-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 14px;cursor:pointer;
  color:rgba(232,220,200,.6);font-size:12.5px;
  border-left:3px solid transparent;
  transition:all .15s;
}
.sb-item:hover{background:rgba(201,162,39,.07);color:var(--be);}
.sb-item.active{background:rgba(201,162,39,.12);color:var(--d);border-left-color:var(--d);font-weight:500;}
.sb-item i{font-size:16px;}
.sb-div{height:1px;background:rgba(201,162,39,.1);margin:6px 12px;}
.sb-badge{margin-left:auto;background:rgba(201,162,39,.2);color:var(--d);font-size:10px;padding:1px 6px;border-radius:8px;}

/* ── MAIN ── */
.main-area{flex:1;overflow-y:auto;padding:20px 22px;background:var(--cr);}

/* ── KPI CARDS ── */
.kpi-row{display:grid;gap:12px;margin-bottom:16px;}
.kpi-4{grid-template-columns:repeat(4,1fr);}
.kpi-3{grid-template-columns:repeat(3,1fr);}
.kpi-card{
  background:var(--white);border:0.5px solid var(--bo);
  border-radius:12px;padding:14px 16px;
  position:relative;overflow:hidden;
  cursor:pointer;
  box-shadow:var(--sh);
  transition:transform .15s,box-shadow .15s;
}
.kpi-card:hover{transform:translateY(-1px);box-shadow:var(--sh2);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--d);}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tl);font-weight:600;margin-bottom:4px;}
.kpi-val{font-size:22px;font-weight:600;color:var(--v);line-height:1.1;}
.kpi-sub{font-size:10px;color:var(--tl);margin-top:3px;}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;}
.page-title{font-size:22px;font-weight:600;color:var(--v);}
.page-sub{font-size:12px;color:var(--tl);margin-top:2px;}
.page-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-gold{background:var(--d);color:var(--v);}.btn-gold:hover{background:var(--dl);}
.btn-dark{background:var(--v);color:var(--d);border:1px solid var(--v);}.btn-dark:hover{background:var(--vm);}
.btn-out{background:transparent;color:var(--v);border:1px solid var(--bo);}.btn-out:hover{background:var(--v);color:var(--d);}
.btn-danger{background:transparent;color:#c0392b;border:1px solid #c0392b;}.btn-danger:hover{background:#c0392b;color:#fff;}
.btn-sm{padding:5px 10px;font-size:11.5px;}
.btn-pdf{background:#e3f2fd;color:#1565c0;border:1px solid #1565c0;}
.btn-pdf:hover{background:#1565c0;color:#fff;}
.btn-ok{background:#e8f5e9;color:#2e7d32;border:1px solid #2e7d32;}
.btn-ok:hover{background:#2e7d32;color:#fff;}
.btn-reject{background:#fce4ec;color:#c0392b;border:1px solid #c0392b;}
.btn-reject:hover{background:#c0392b;color:#fff;}

/* ── CARD ── */
.card{background:var(--white);border:0.5px solid var(--bo);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:var(--sh);}
.card-head{padding:11px 16px;border-bottom:0.5px solid var(--bo);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:13px;font-weight:500;color:var(--v);display:flex;align-items:center;gap:7px;}
.card-title i{color:var(--d);}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;max-height:400px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{background:var(--v);color:var(--d);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:9px 11px;text-align:left;position:sticky;top:0;white-space:nowrap;z-index:1;}
td{padding:8px 11px;color:var(--td);border-bottom:0.5px solid rgba(26,58,46,.05);white-space:nowrap;}
tr:hover td{background:rgba(201,162,39,.03);}
tr:last-child td{border-bottom:none;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-green{background:#e8f5e9;color:#2e7d32;}
.badge-yellow{background:#fff8e1;color:#c77700;}
.badge-blue{background:#e3f2fd;color:#1565c0;}
.badge-red{background:#fce4ec;color:#c62828;}
.badge-gray{background:#f0ede6;color:#5a5a5a;}
.badge-gold{background:var(--dp);color:var(--v);}
.badge-orange{background:#fff3e0;color:#e65100;}

/* ── FILTER BAR ── */
.filter-bar{
  background:var(--white);border:0.5px solid var(--bo);
  border-radius:10px;padding:10px 14px;
  margin-bottom:12px;display:flex;align-items:center;
  gap:8px;flex-wrap:wrap;
  box-shadow:var(--sh);
}
.filter-input{
  padding:7px 11px;border:0.5px solid var(--bd);
  border-radius:7px;font-size:12.5px;background:var(--cr);
  font-family:'DM Sans',sans-serif;outline:none;color:var(--td);
}
.filter-input:focus{border-color:var(--d);background:var(--white);}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  display:flex;align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;z-index:500;
}
.modal-bg.hidden{display:none;}
.modal{
  background:var(--white);border-radius:16px;
  width:100%;max-width:680px;
  border-top:4px solid var(--d);
  margin:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-head{padding:14px 20px 12px;border-bottom:0.5px solid var(--bo);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:18px;font-weight:500;color:var(--v);}
.modal-sub{font-size:11px;color:var(--tl);margin-top:2px;}
.modal-body{padding:18px 20px;max-height:68vh;overflow-y:auto;}
.modal-foot{padding:12px 20px;border-top:0.5px solid var(--bo);display:flex;justify-content:flex-end;gap:8px;}
.modal-close{width:30px;height:30px;border-radius:8px;border:0.5px solid var(--bo);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tl);font-size:16px;flex-shrink:0;}
.modal-close:hover{background:var(--cr);color:var(--v);}

/* ── AUTO STRIP ── */
.auto-strip{display:flex;border:1px solid var(--vm);border-radius:10px;overflow:hidden;margin-bottom:16px;background:var(--dp);}
.auto-cell{flex:1;padding:10px 15px;border-right:1px solid rgba(45,92,71,.2);}
.auto-cell:last-child{border-right:none;}
.auto-label{font-size:9px;font-weight:600;color:var(--vm);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.auto-val{font-size:19px;font-weight:600;color:var(--v);}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:10px;font-weight:600;color:var(--v);text-transform:uppercase;letter-spacing:.5px;}
.form-input{
  padding:8px 12px;border:0.5px solid var(--bd);
  border-radius:8px;font-size:13px;background:var(--cr);
  font-family:'DM Sans',sans-serif;outline:none;color:var(--td);
  width:100%;
}
.form-input:focus{border-color:var(--d);background:var(--white);}
.form-textarea{min-height:60px;resize:vertical;}

/* ── COT LINE CARD ── */
.cot-line{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px;background:var(--white);
  border:0.5px solid var(--bo);border-radius:10px;
  margin-bottom:7px;
  box-shadow:var(--sh);
}
.cot-foto{
  width:48px;height:48px;border-radius:8px;
  background:var(--dp);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;overflow:hidden;
}
.cot-foto img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.cot-foto i{font-size:20px;color:var(--vm);}
.cot-body{flex:1;min-width:0;}
.cot-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;}
.cot-sku{font-size:10px;font-weight:600;color:var(--d);background:var(--v);padding:2px 7px;border-radius:8px;}
.cot-name{font-size:13px;font-weight:500;color:var(--v);}
.cot-desc{font-size:11px;color:var(--tl);margin-bottom:5px;line-height:1.4;}
.cot-nums{display:flex;gap:14px;flex-wrap:wrap;}
.cot-num-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--tl);font-weight:600;}
.cot-num-val{font-size:12.5px;font-weight:500;color:var(--v);}
.cot-num-val.gold{color:var(--d);font-size:13.5px;font-weight:600;}
.cot-del{width:26px;height:26px;border-radius:6px;border:none;background:#fce4ec;color:#c0392b;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:center;}

/* ── TOTAL BOX ── */
.total-box{
  background:var(--v);border-radius:11px;
  padding:14px 18px;display:flex;
  justify-content:space-between;align-items:center;
  margin-top:10px;
}

/* ── PRODUCT GRID ── */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.prod-card{background:var(--white);border:0.5px solid var(--bo);border-radius:10px;overflow:hidden;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;}
.prod-card:hover{transform:translateY(-1px);box-shadow:var(--sh2);border-color:var(--d);}
.prod-head{background:var(--v);padding:9px 12px;}
.prod-name{color:var(--be);font-weight:500;font-size:12.5px;line-height:1.3;}
.prod-sku{color:var(--d);font-size:10px;margin-top:2px;}
.prod-body{padding:10px 12px;}
.prod-row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--tm);padding:3px 0;border-bottom:0.5px solid rgba(26,58,46,.05);}
.prod-row:last-child{border-bottom:none;}
.prod-row span:last-child{font-weight:500;color:var(--v);}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;}
.toast{
  background:var(--v);color:var(--be);
  padding:10px 15px;border-radius:10px;
  font-size:12.5px;font-family:'DM Sans',sans-serif;
  border-left:4px solid var(--d);
  display:flex;align-items:center;gap:8px;
  min-width:240px;
  box-shadow:var(--sh2);
  animation:slideIn .2s ease;
}
.toast-success{border-left-color:#27ae60;}
.toast-error{border-left-color:#c0392b;}
.toast-warn{border-left-color:#f39c12;}
@keyframes slideIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ── NOTA BOX ── */
.nota-box{background:#fff8e1;border:0.5px solid #c77700;border-radius:9px;padding:10px 14px;font-size:12px;color:#6d4c00;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;}

/* ── PROD PREVIEW ── */
#prod-preview{display:none;background:var(--cr);border-radius:9px;padding:10px 13px;margin-bottom:12px;border:0.5px solid var(--bo);align-items:center;gap:10px;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(26,58,46,.2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(26,58,46,.4);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">

    <button class="login-qbtn" id="qb"><i class="ti ti-building-warehouse" style="color:#c9a227;font-size:18px;"></i><div><b>Op. Bodega</b><span>bodega@montana.com · bodega123</span></div></button>
    <button class="login-qbtn" id="qc"><i class="ti ti-truck" style="color:#c9a227;font-size:18px;"></i><div><b>Proveedor Ally/PIANT</b><span>proveedor@ally.cn · prov123</span></div></button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo"><i class="ti ti-leaf"></i></div>
      <div>
        <div class="tb-name">Montana Equipments</div>

  </div>
  <div class="body-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-area" id="main-area"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg hidden" id="modal-bg">
  <div class="modal" id="modal-box"></div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toasts"></div>

<script>

// DATOS Y ESTADO
// ═══════════════════════════════════════════
const USERS=[

  {e:'jorgehrueda@hotmail.com',p:'admin123',n:'Jorge Rueda',r:'admin'},

// ─── STORAGE (localStorage para persistencia real) ───
function saveData(){
  try{
    localStorage.setItem('mt_cots', JSON.stringify(S.cots));
    localStorage.setItem('mt_prods', JSON.stringify(S.prods));
  }catch(e){}
}
function loadData(){
  try{
    const c=localStorage.getItem('mt_cots');
    const p=localStorage.getItem('mt_prods');
    S.cots = c?JSON.parse(c):[...OCS_INIT];
    S.prods = p?JSON.parse(p):[...PRODS_INIT];
  }catch(e){
    S.cots=[...OCS_INIT];
    S.prods=[...PRODS_INIT];
  }
}

// ─── HELPERS ───
const fN=(n,d=0)=>Number(n||0).toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const fR=n=>'¥'+fN(n,0);
const fU=n=>'$'+fN(n,2);
const todayDisp=()=>new Date().toLocaleDateString('es-CO',{year:'numeric',month:'2-digit',day:'2-digit'});
const todayISO=()=>new Date().toISOString().split('T')[0];
const curYear=()=>new Date().getFullYear();

function nextOC(){
  const nums=S.cots.map(c=>parseInt(c.oc)).filter(n=>!isNaN(n));
  return String(Math.max(...nums,31)+1).padStart(3,'0')+'/'+curYear();
}

  'Completada':'<span class="badge badge-green">Completada</span>',
  'En proceso':'<span class="badge badge-yellow">En proceso</span>',

};
const B=k=>BADGES[k]||`<span class="badge badge-gray">${k||'—'}</span>`;

let _tc=0;
function toast(msg,type='success'){
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.innerHTML=`<i class="ti ti-${type==='success'?'circle-check':type==='error'?'circle-x':'alert-triangle'}" style="font-size:15px;"></i>${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.style.opacity='0',2800);
  setTimeout(()=>el.remove(),3100);
}

function openModal(html){
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal-bg').classList.remove('hidden');
  bindModal();
}
function closeModal(){
  document.getElementById('modal-bg').classList.add('hidden');
}

// ─── AUTH ───
function doLogin(){
  const e=document.getElementById('le').value.trim().toLowerCase();
  const p=document.getElementById('lp').value.trim();
  const u=USERS.find(x=>x.e.toLowerCase()===e&&x.p===p);
  if(!u){document.getElementById('login-err').style.display='block';return;}
  S.user=u;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-uname').textContent=u.n;
  document.getElementById('tb-role').textContent=u.r.toUpperCase();
  loadData();
  renderSidebar();
  renderPage();
}
function quickLogin(r){
  const u=USERS.find(x=>x.r===r);if(!u)return;
  document.getElementById('le').value=u.e;
  document.getElementById('lp').value=u.p;
  doLogin();
}
function doLogout(){
  S.user=null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').style.display='none';
}

// ─── SIDEBAR ───
function renderSidebar(){
  const r=S.user.r;
  let html='';
  html+=`<span class="sb-section">Importación</span>`;
  html+=`<div class="sb-item ${S.page==='cots'?'active':''}" data-p="cots"><i class="ti ti-calculator"></i>Cotizaciones<span class="sb-badge">${S.cots.length}</span></div>`;
  html+=`<div class="sb-div"></div><span class="sb-section">Catálogo</span>`;
  html+=`<div class="sb-item ${S.page==='prods'?'active':''}" data-p="prods"><i class="ti ti-package"></i>Productos<span class="sb-badge">${S.prods.length}</span></div>`;
  document.getElementById('sidebar').innerHTML=html;
  document.querySelectorAll('.sb-item[data-p]').forEach(el=>{
    el.onclick=()=>{S.page=el.dataset.p;renderSidebar();renderPage();};
  });
}

// ─── PAGES ───
function renderPage(){
  const ma=document.getElementById('main-area');
  if(S.page==='cots') ma.innerHTML=pageCots();
  else if(S.page==='prods') ma.innerHTML=pageProds();
  bindPage();
}

function pageCots(){
  const fil=S.cots.filter(c=>{
    if(S.fE&&c.estado!==S.fE)return false;
    if(S.fA&&c.ano!==S.fA)return false;
    if(S.fS){const s=S.fS.toLowerCase();if(!`${c.oc} ${c.fv} ${c.cliente||''} ${c.notas||''}`.toLowerCase().includes(s))return false;}
    return true;

      <div class="kpi-sub">importación activa</div>

      <div class="kpi-val" style="color:#27ae60;">${byE('Completada')}</div>
    </div>

// ─── BIND PAGE EVENTS ───
function bindPage(){
  // Filters
  const fs=document.getElementById('f-search');if(fs)fs.oninput=e=>{S.fS=e.target.value;renderPage();};
  const fe=document.getElementById('f-estado');if(fe)fe.onchange=e=>{S.fE=e.target.value;renderPage();};
  const fa=document.getElementById('f-ano');if(fa)fa.onchange=e=>{S.fA=e.target.value;renderPage();};
  const ps=document.getElementById('p-search');if(ps)ps.oninput=e=>{S.pS=e.target.value;renderPage();};
  const pg=document.getElementById('p-grupo');if(pg)pg.onchange=e=>{S.pG=e.target.value;renderPage();};
  // Cotizaciones
  document.getElementById('btn-new-cot')?.addEventListener('click',()=>{S.ncL=[];S.ncC='';S.ncN='';openModal(modalNewCot());});
  document.querySelectorAll('.btn-ver-cot').forEach(b=>b.onclick=()=>openModal(modalVerCot(+b.dataset.id)));
  document.querySelectorAll('.btn-apro').forEach(b=>b.onclick=()=>{
    const c=S.cots.find(x=>x.id===+b.dataset.id);
    if(c){c.estado='En proceso';saveData();renderSidebar();renderPage();toast('Cotización aprobada → importación activa ✓');}
  });
  document.querySelectorAll('.btn-recha').forEach(b=>b.onclick=()=>{
    const c=S.cots.find(x=>x.id===+b.dataset.id);
    if(c){c.estado='Rechazada';saveData();renderSidebar();renderPage();toast('Cotización rechazada','warn');}
  });
  // Productos
  document.getElementById('btn-new-prod')?.addEventListener('click',()=>openModal(modalProd(null)));
  document.querySelectorAll('.btn-edit-prod').forEach(b=>b.onclick=()=>{
    const p=S.prods.find(x=>x.id===+b.dataset.id);openModal(modalProd(p));
  });
  document.querySelectorAll('.btn-del-prod').forEach(b=>b.onclick=()=>{
    if(confirm('¿Eliminar este producto?')){
      S.prods=S.prods.filter(x=>x.id!==+b.dataset.id);
      saveData();renderSidebar();renderPage();toast('Producto eliminado','warn');
    }
  });
}

function toggleFilter(key,val){S[key]=S[key]===val?'':val;renderPage();}

// ─── MODAL HELPERS ───
function bindModal(){
  document.getElementById('modal-bg').onclick=e=>{if(e.target===document.getElementById('modal-bg'))closeModal();};
  document.querySelectorAll('.modal-close,.btn-modal-close').forEach(b=>b.onclick=closeModal);
  // new cot
  document.getElementById('btn-add-line')?.addEventListener('click',()=>openModal(modalAddLine()));
  document.querySelectorAll('.btn-del-line').forEach(b=>b.onclick=()=>{S.ncL.splice(+b.dataset.i,1);openModal(modalNewCot());});
  document.getElementById('btn-save-cot')?.addEventListener('click',saveCot);
  document.getElementById('nc-cliente')?.addEventListener('input',e=>S.ncC=e.target.value);
  document.getElementById('nc-notas')?.addEventListener('input',e=>S.ncN=e.target.value);
  // add line
  document.getElementById('al-sku')?.addEventListener('change',onAlSku);
  document.getElementById('al-qty')?.addEventListener('input',updTotal);
  document.getElementById('al-rmb')?.addEventListener('input',updTotal);
  document.getElementById('btn-save-line')?.addEventListener('click',saveLine);
  // prod
  document.getElementById('btn-save-prod')?.addEventListener('click',saveProd);
  document.getElementById('fi-foto')?.addEventListener('change',function(){addFoto(this);});
  // ver cot
  document.querySelectorAll('.btn-apro-modal').forEach(b=>b.onclick=()=>{
    const c=S.cots.find(x=>x.id===+b.dataset.id);
    if(c){c.estado='En proceso';saveData();renderSidebar();renderPage();closeModal();toast('Aprobada → importación activa ✓');}
  });
  document.querySelectorAll('.btn-recha-modal').forEach(b=>b.onclick=()=>{
    const c=S.cots.find(x=>x.id===+b.dataset.id);
    if(c){c.estado='Rechazada';saveData();renderSidebar();renderPage();closeModal();toast('Rechazada','warn');}
  });
}

// ─── ACTIONS ───
function onAlSku(){
  const sku=document.getElementById('al-sku').value;
  const p=S.prods.find(x=>x.sku===sku);
  const pv=document.getElementById('prod-preview');
  if(p&&pv){
    pv.style.display='flex';
    const pf=document.getElementById('pp-foto');
    if(pf){if(p.fotos?.length)pf.innerHTML=`<img src="${p.fotos[0]}" style="width:48px;height:48px;object-fit:cover;border-radius:8px;" alt="">`;
    else pf.innerHTML=`<i class="ti ti-package" style="font-size:20px;color:var(--vm);"></i>`;}
    document.getElementById('pp-nom').textContent=p.n;
    document.getElementById('pp-car').textContent=p.d||'';
    const ap=document.getElementById('al-prod'),ar=document.getElementById('al-rmb'),ac=document.getElementById('al-car');
    if(ap)ap.value=p.n;
    if(ar&&p.rmb){ar.value=p.rmb;updTotal();}
    if(ac&&p.d)ac.value=p.d;
  }else if(pv)pv.style.display='none';
}

function updTotal(){
  const q=+(document.getElementById('al-qty')?.value||0);
  const r=+(document.getElementById('al-rmb')?.value||0);
  const t=document.getElementById('al-total');
  if(t)t.textContent='¥'+fN(q*r,0);
}

function saveLine(){
  const sku=document.getElementById('al-sku')?.value||'';
  const prod=document.getElementById('al-prod')?.value||'';
  const caract=document.getElementById('al-car')?.value||'';
  const qty=parseFloat(document.getElementById('al-qty')?.value)||0;
  const un=document.getElementById('al-un')?.value||'PCS';
  const rmb=parseFloat(document.getElementById('al-rmb')?.value)||0;
  const aut=document.getElementById('al-aut')?.value||'';
  if(!prod){toast('La descripción es obligatoria','error');return;}
  if(!qty||qty<=0){toast('Cantidad inválida','error');return;}
  if(!rmb||rmb<=0){toast('Precio RMB obligatorio','error');return;}
  const po=S.prods.find(p=>p.sku===sku);
  S.ncL.push({sku:sku==='nuevo'?'':sku,p:prod,d:caract,foto:po?.fotos?.[0]||'',qty,u:un,rmb,fob:qty*rmb,autorizacion:aut});
  openModal(modalNewCot());
  toast('Línea agregada');
}

function saveCot(){
  const cliente=document.getElementById('nc-cliente')?.value||S.ncC;
  const notas=document.getElementById('nc-notas')?.value||S.ncN;
  if(S.ncL.length===0){toast('Agrega al menos un producto','error');return;}
  const oc=nextOC();
  S.cots.unshift({
    id:Date.now(),oc,fv:'',ano:String(curYear()),fecha:todayISO(),
    cliente,notas,estado:'Stand By',
    totalFob:S.ncL.reduce((s,l)=>s+l.fob,0),totalUsd:0,
    lineas:S.ncL.length,detalle:[...S.ncL]
  });
  closeModal();S.ncL=[];S.ncC='';S.ncN='';
  saveData();renderSidebar();renderPage();
  toast('Cotización '+oc+' guardada en Stand By ✓');
}

function saveProd(){
  const sku=document.getElementById('p-sku')?.value||'';
  const nom=document.getElementById('p-nom')?.value||'';
  if(!sku||!nom){toast('SKU y Nombre son obligatorios','error');return;}
  const id=document.getElementById('p-id')?.value;
  const ex=id?S.prods.find(x=>x.id===+id):null;
  const prod={
    id:ex?.id||Date.now(),sku,n:nom,
    g:document.getElementById('p-grp')?.value||'Otros',
    rmb:parseFloat(document.getElementById('p-rmb')?.value)||0,
    d:document.getElementById('p-desc')?.value||'',
    sub:document.getElementById('p-sub')?.value||'',
    apro:'Aprobado',fotos:ex?.fotos||[]
  };
  if(ex){const i=S.prods.findIndex(x=>x.id===ex.id);if(i>=0)S.prods[i]=prod;}
  else S.prods.unshift(prod);
  closeModal();saveData();renderSidebar();renderPage();
  toast(ex?'Producto actualizado':'Producto creado ✓');
}

function addFoto(input){
  const id=document.getElementById('p-id')?.value;
  const p=id?S.prods.find(x=>x.id===+id):null;
  const target=p||(S.prods.find(x=>x.sku===document.getElementById('p-sku')?.value)||null);
  Array.from(input.files||[]).forEach(f=>{
    if(!target){toast('Guarda el producto primero','warn');return;}
    if((target.fotos||[]).length>=5){toast('Máximo 5 fotos','warn');return;}
    const r=new FileReader();
    r.onload=e=>{
      if(!target.fotos)target.fotos=[];
      target.fotos.push(e.target.result);
      if(p){const i=S.prods.findIndex(x=>x.id===p.id);if(i>=0)S.prods[i]=target;}
      saveData();openModal(modalProd(target));
    };r.readAsDataURL(f);
  });
}

function delFoto(prodId,idx){
  const p=S.prods.find(x=>x.id===prodId);
  if(p?.fotos){p.fotos.splice(idx,1);saveData();openModal(modalProd(p));}
}
